<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",sans-serif;background:#1e1e1e;color:#e0e0e0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{background:#252525;border-bottom:2px solid #a0e515;padding:14px 28px;display:flex;align-items:center;gap:18px;flex-shrink:0}
.header .brand{font-size:26px;font-weight:700;color:#a0e515;letter-spacing:3px}
.header .subtitle{font-size:14px;color:#888;border-left:1px solid #444;padding-left:18px}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:#252525;border-right:1px solid #333;overflow-y:auto;padding:16px 0}
.sidebar-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#666;padding:8px 20px 12px}
.sidebar-item{display:block;padding:10px 20px;color:#bbb;font-size:14px;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.sidebar-item:hover{background:#2a2a2a;color:#a0e515;border-left-color:#a0e51566}
.sidebar-item.active{background:#1e1e1e;color:#a0e515;border-left-color:#a0e515;font-weight:600}
.sidebar-item .n{display:inline-block;width:28px;color:#666;font-size:12px}
.sidebar-item.active .n{color:#a0e515}
.main{flex:1;overflow-y:auto;padding:36px 48px 60px}
#content h1{font-size:28px;color:#a0e515;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #333}
#content h2{font-size:22px;color:#c8e86e;margin-top:36px;margin-bottom:14px}
#content h3{font-size:17px;color:#d0d0d0;margin-top:24px;margin-bottom:10px}
#content p{line-height:1.7;margin-bottom:12px;color:#ccc}
#content a{color:#a0e515}
#content strong{color:#e0e0e0}
#content ul,#content ol{margin:10px 0 14px 24px;line-height:1.7}
#content li{margin-bottom:4px;color:#ccc}
#content hr{border:none;border-top:1px solid #333;margin:28px 0}
#content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
#content thead th{background:#2a2a2a;color:#a0e515;padding:10px 14px;text-align:left;border:1px solid #3a3a3a}
#content tbody td{padding:8px 14px;border:1px solid #333;color:#ccc}
#content tbody tr:nth-child(even){background:#242424}
#content tbody tr:hover{background:#2c2c2c}
#content pre{background:#161616;border:1px solid #333;border-radius:6px;padding:16px;overflow-x:auto;margin:12px 0 16px}
#content pre code{color:#d4d4d4;font-family:Consolas,monospace;background:none;padding:0;border:none;font-size:13px}
#content code{background:#2a2a2a;color:#ce9178;padding:2px 6px;border-radius:3px;font-family:Consolas,monospace;font-size:13px}
#content blockquote{border-left:3px solid #a0e515;padding:8px 16px;margin:12px 0;background:#242424;color:#bbb}
.katex{color:#e0e0e0}
</style>
</head>

function b64decode(str) {
  var bin = atob(str);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}

    renderMathInElement(contentEl, {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "$", right: "$", display: false}
      ],
      throwOnError: false
    });
  }
  document.querySelector(".main").scrollTop = 0;
}

loadCh(0);
// Global handler: intercept ALL anchor link clicks to prevent page navigation
document.addEventListener("click", function(e) {
  var a = e.target.closest("a");
  if (!a) return;
  var href = a.getAttribute("href");
  if (!href || !href.startsWith("#")) return;
  e.preventDefault();
  e.stopPropagation();
  var tid = decodeURIComponent(href.substring(1));
  var el = document.getElementById(tid);
  if (!el) {
    var norm = tid.toLowerCase().replace(/[^\w\u00C0-\u024F]+/g, "-").replace(/^-|-$/g, "");
    el = document.getElementById(norm);
  }
  if (!el) {
    // Last resort: search all headers for matching text
    var headers = contentEl.querySelectorAll("h1,h2,h3,h4,h5,h6");
    var searchText = tid.replace(/-/g, " ").toLowerCase();
    for (var i = 0; i < headers.length; i++) {
      var hText = headers[i].textContent.toLowerCase().trim();
      if (hText === searchText || hText.indexOf(searchText) !== -1 || headers[i].id === tid) {
        el = headers[i]; break;
      }
    }
  }
  if (el) { el.scrollIntoView({ behavior: "smooth", block: "start" }); }
}, true);
</script>
